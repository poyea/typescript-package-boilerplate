name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - name: Install
      run: bun install --frozen-lockfile
    - name: Lint
      run: bun run lint
    - name: Test
      run: bun test
    - name: Build
      run: bun run build
